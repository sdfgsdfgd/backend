name: Backend Full Suite

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules are UTC. This is Monday 04:30 in Melbourne during AEST,
    # and Monday 05:30 during AEDT.
    - cron: "30 18 * * 0"

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # local-tests: fast local runtime gate for backend deploy and module checks.
  # ---------------------------------------------------------------------------
  backend-local:
    name: local-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: x
          POSTGRES_USER: x
          POSTGRES_PASSWORD: x
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U x -d x"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build server test distribution
        run: ./gradlew :verifyServer :installServer --warning-mode all

      - name: Start backend locally
        env:
          DB_URL: jdbc:postgresql://127.0.0.1:5432/x
          DB_USER: x
          DB_PASSWORD: x
          LOG_DIR: "${{ runner.temp }}/backend-logs"
        run: |
          set -euo pipefail
          mkdir -p "$LOG_DIR"
          sudo env \
            DB_URL="$DB_URL" \
            DB_USER="$DB_USER" \
            DB_PASSWORD="$DB_PASSWORD" \
            LOG_DIR="$LOG_DIR" \
            JAVA_HOME="$JAVA_HOME" \
            PATH="$JAVA_HOME/bin:$PATH" \
            "$GITHUB_WORKSPACE/server/build/install/server/bin/server" \
            > "$RUNNER_TEMP/backend.log" 2>&1 &

      - name: local-tests
        run: |
          set -euo pipefail
          for attempt in {1..45}; do
            if curl -fsS --max-time 5 http://127.0.0.1/test | tee "$RUNNER_TEMP/local-test.txt"; then
              grep -F "[ OK ]" "$RUNNER_TEMP/local-test.txt"
              curl -fsS --max-time 5 http://127.0.0.1/metrics/security | tee "$RUNNER_TEMP/local-metrics.txt"
              grep -F "backend_request_event_class_total" "$RUNNER_TEMP/local-metrics.txt"
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/backend.log"
          exit 1

      - name: Stop backend
        if: always()
        run: sudo pkill -f "$GITHUB_WORKSPACE/server/build/install/server/bin/server" || true

      - name: Print backend log
        if: always()
        run: cat "$RUNNER_TEMP/backend.log" || true

  # ---------------------------------------------------------------------------
  # server-py-contract-tests: shared DTO wire contract for backend and server_py.
  # ---------------------------------------------------------------------------
  server-py-contract-tests:
    name: all-tests / server-py-contract-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: server-py-contract-tests
        run: ./gradlew :core:jvmTest --tests 'net.sdfgsdfg.data.model.CoreDtoSerializationTest.selfTestDtosKeepPublicWireNames' --warning-mode all

  # ---------------------------------------------------------------------------
  # server-py-live-selftest: reuses the backend webhook-triggered live selftest.
  # ---------------------------------------------------------------------------
  server-py-live-selftest:
    name: all-tests / server-py-live-selftest
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: server-py-live-selftest
        run: python3 .github/scripts/server_py_live_selftest.py

  # ---------------------------------------------------------------------------
  # arcana-smoke: asks backend to run q-local Arcana full pyramid and publish JSON.
  # ---------------------------------------------------------------------------
  arcana-smoke:
    name: all-tests / arcana-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: arcana-smoke
        env:
          ARCANA_SMOKE_WEBHOOK_SECRET: ${{ secrets.ARCANA_SMOKE_WEBHOOK_SECRET }}
        run: python3 .github/scripts/arcana_smoke.py

  # ---------------------------------------------------------------------------
  # public-ingress-smoke: first public edge of the future full test pyramid.
  # ---------------------------------------------------------------------------
  public-ingress:
    name: all-tests / public-ingress
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: public-ingress-smoke
        run: |
          set -euo pipefail
          curl -fsS --retry 2 --retry-delay 2 --max-time 10 https://sdfgsdfg.net/test | tee "$RUNNER_TEMP/public-smoke.txt"
          grep -F "[ OK ]" "$RUNNER_TEMP/public-smoke.txt"
          curl -fsS --retry 2 --retry-delay 2 --max-time 10 https://ops.sdfgsdfg.net/api/ops/summary > "$RUNNER_TEMP/ops-summary.json"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          summary = json.loads(Path(os.environ["RUNNER_TEMP"], "ops-summary.json").read_text())
          ids = [repo["id"] for repo in summary["repos"]]
          assert ids == ["backend", "server_py", "arcana"], ids
          PY
          curl -fsS --retry 2 --retry-delay 2 --max-time 10 https://ops.sdfgsdfg.net/ | tee "$RUNNER_TEMP/ops-shell.html"
          grep -F "Trio Ops Cockpit" "$RUNNER_TEMP/ops-shell.html"
          grep -F "dashboard-web.js" "$RUNNER_TEMP/ops-shell.html"

  # Future all-tests branches:
  # - arcana issue/session contract checks once Arcana owns those schemas.

  dashboard:
    name: all-tests / dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: dashboard
        run: ./gradlew :verifyDashboard --warning-mode all

  all-tests:
    name: all-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - backend-local
      - server-py-contract-tests
      - server-py-live-selftest
      - arcana-smoke
      - public-ingress
      - dashboard
    if: always()

    steps:
      - name: all-tests
        run: |
          set -euo pipefail
          test "${{ needs.backend-local.result }}" = "success"
          test "${{ needs.server-py-contract-tests.result }}" = "success"
          test "${{ needs.server-py-live-selftest.result }}" = "success"
          test "${{ needs.arcana-smoke.result }}" = "success"
          test "${{ needs.public-ingress.result }}" = "success"
          test "${{ needs.dashboard.result }}" = "success"
