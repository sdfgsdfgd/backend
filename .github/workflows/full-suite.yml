name: Backend Full Suite

on:
  workflow_dispatch:
    inputs:
      public_smoke_url:
        description: "Public ingress URL checked by all-tests."
        required: true
        default: "https://sdfgsdfg.net/test"

permissions:
  contents: read

jobs:
  local-tests:
    name: local-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: x
          POSTGRES_USER: x
          POSTGRES_PASSWORD: x
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U x -d x"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build server test distribution
        run: ./gradlew :verifyServer :installServer --warning-mode all

      - name: Start backend locally
        env:
          DB_URL: jdbc:postgresql://127.0.0.1:5432/x
          DB_USER: x
          DB_PASSWORD: x
          LOG_DIR: "${{ runner.temp }}/backend-logs"
        run: |
          set -euo pipefail
          mkdir -p "$LOG_DIR"
          sudo env \
            DB_URL="$DB_URL" \
            DB_USER="$DB_USER" \
            DB_PASSWORD="$DB_PASSWORD" \
            LOG_DIR="$LOG_DIR" \
            JAVA_HOME="$JAVA_HOME" \
            PATH="$JAVA_HOME/bin:$PATH" \
            "$GITHUB_WORKSPACE/server/build/install/server/bin/server" \
            > "$RUNNER_TEMP/backend.log" 2>&1 &

      - name: local-tests
        run: |
          set -euo pipefail
          for attempt in {1..45}; do
            if curl -fsS --max-time 5 http://127.0.0.1/test | tee "$RUNNER_TEMP/local-smoke.txt"; then
              grep -F "[ OK ]" "$RUNNER_TEMP/local-smoke.txt"
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/backend.log"
          exit 1

      - name: Stop backend
        if: always()
        run: sudo pkill -f "$GITHUB_WORKSPACE/server/build/install/server/bin/server" || true

      - name: Print backend log
        if: always()
        run: cat "$RUNNER_TEMP/backend.log" || true

  all-tests:
    name: all-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: local-tests

    steps:
      - name: public-smoke
        env:
          PUBLIC_SMOKE_URL: "${{ inputs.public_smoke_url }}"
        run: |
          set -euo pipefail
          curl -fsS --retry 2 --retry-delay 2 --max-time 10 "$PUBLIC_SMOKE_URL" | tee "$RUNNER_TEMP/public-smoke.txt"
          grep -F "[ OK ]" "$RUNNER_TEMP/public-smoke.txt"
