name: backend-local

services:
  postgres:
    image: postgres:17-alpine
    container_name: backend-local-postgres
    environment:
      POSTGRES_DB: x
      POSTGRES_USER: x
      POSTGRES_PASSWORD: x
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U x -d x"]
      interval: 1s
      timeout: 3s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
